spring:
  datasource:
    url: jdbc:mysql://localhost:3306/order_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
  data:
    redis:
      host: localhost
      port: 6379

app:
  kafka:
    topics:
      order-placed: order-placed-events
      order-cancelled: order-cancelled-events

# Day 7: Resilience4j circuit breaker for the inventory Feign call
resilience4j:
  circuitbreaker:
    instances:
      inventoryService:                       # must match @CircuitBreaker(name="inventoryService")
        register-health-indicator: true
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5            # need >=5 samples before judging
        failure-rate-threshold: 50            # trip at 50% failures
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health, info, circuitbreakers, circuitbreakerevents
  health:
    circuitbreakers:
      enabled: true
