# Shared defaults inherited by EVERY service (merged under each {service}.yml)
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health, info

logging:
  level:
    com.oms: DEBUG
    org.apache.kafka: WARN
