server:
  port: 8081

spring:
  application:
    name: order-service

  # PostgreSQL Configuration
  datasource:
    url: jdbc:mysql://localhost:3307/order_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update         # auto creates/updates tables on startup
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  # Kafka Configuration
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all                # wait for all ISR replicas (safest)
      retries: 3
    consumer:
      group-id: order-service-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      auto-offset-reset: earliest
      properties:
        spring.json.trusted.packages: "*"

  # Redis Configuration
  data:
    redis:
      host: localhost
      port: 6379

# Kafka Topic Names (centralized here, injected via @Value)
app:
  kafka:
    topics:
      order-placed: order-placed-events
      order-cancelled: order-cancelled-events

# Actuator endpoints (health check for Docker/Azure)
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.oms: DEBUG
    org.apache.kafka: WARN    # reduce kafka noise in logs

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
